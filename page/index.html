<script>
/* Apply a saved theme before first paint so there's no flash. When nothing is
   saved we leave data-theme unset and the CSS @media rule follows the OS. */
(function(){try{var t=localStorage.getItem('rw-theme');if(t==='dark'||t==='light')document.documentElement.setAttribute('data-theme',t);}catch(e){}})();
</script>

<style>
:root{
  --bg:#f4f3f0; --surface:#fff; --surface-2:#fbfbfa;
  --text:#1c1c1e; --muted:#8a8a8e; --faint:#b8b8bc;
  --line:rgba(0,0,0,.10); --hair:rgba(0,0,0,.055); --dot:rgba(0,0,0,.11);
  --shadow:0 8px 30px rgba(0,0,0,.07);
  --accent:#3b5bdb; --accent-ink:#fff; --amber:#b45309; --green:#15803d;
  --tip-bg:#1c1c1e; --tip-fg:#fff; --tip-sub:#c7c7cc;
  color-scheme:light;
}
/* Dark palette. Applied in two cases: the OS asks for dark AND the visitor has
   not chosen a theme (:not([data-theme])), or the visitor explicitly picked
   dark. Accent tints are derived with color-mix so they track the theme. */
@media (prefers-color-scheme:dark){
  :root:not([data-theme]){
    --bg:#101216; --surface:#181a20; --surface-2:#1e212a;
    --text:#e8e8ec; --muted:#9498a3; --faint:#63666f;
    --line:rgba(255,255,255,.11); --hair:rgba(255,255,255,.06); --dot:rgba(255,255,255,.16);
    --shadow:0 8px 30px rgba(0,0,0,.5);
    --accent:#7b93ff; --accent-ink:#0f1013; --amber:#f0a952; --green:#54c98a;
    --tip-bg:#2a2e3a; --tip-fg:#fff; --tip-sub:#c7c7cc;
    color-scheme:dark;
  }
}
:root[data-theme="dark"]{
  --bg:#101216; --surface:#181a20; --surface-2:#1e212a;
  --text:#e8e8ec; --muted:#9498a3; --faint:#63666f;
  --line:rgba(255,255,255,.11); --hair:rgba(255,255,255,.06); --dot:rgba(255,255,255,.16);
  --shadow:0 8px 30px rgba(0,0,0,.5);
  --accent:#7b93ff; --accent-ink:#0f1013; --amber:#f0a952; --green:#54c98a;
  --tip-bg:#2a2e3a; --tip-fg:#fff; --tip-sub:#c7c7cc;
  color-scheme:dark;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);padding:34px 24px 60px;font-family:system-ui,-apple-system,sans-serif;color:var(--text)}
.frame{width:1180px;margin:0 auto;background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);overflow:hidden}
.chrome{display:flex;align-items:center;padding:10px 15px;border-bottom:1px solid var(--line);background:var(--surface-2)}
.dot{width:9px;height:9px;border-radius:50%;background:var(--dot)}
.dot+.dot{margin-left:6px}
.chrome .ttl{font:600 11px system-ui;color:var(--muted);margin-left:9px}
.themebtn{margin-left:auto;width:27px;height:22px;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);background:var(--surface);border-radius:5px;color:var(--muted);font-size:12px;line-height:1;cursor:pointer;transition:color .12s,border-color .12s}
.themebtn:hover{color:var(--text);border-color:var(--muted)}
.pagebody{padding:22px 24px 24px}

.headline{display:flex;align-items:flex-end;gap:34px;padding-bottom:16px;border-bottom:1px solid var(--line)}
.kpi .v{font:700 30px/1 system-ui;letter-spacing:-.025em;font-variant-numeric:tabular-nums}
.kpi .sfx{font:600 14px system-ui;color:var(--muted);margin-left:3px}
.kpi2 .v{font:700 22px/1 system-ui}
.cap{font-size:11px;color:var(--muted);margin-top:5px}
.headright{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.navlink{font:500 11px 'IBM Plex Mono',monospace;color:var(--muted);text-decoration:none}
.navlink:hover{color:var(--accent);text-decoration:underline}
.snap{text-align:right}
.snap .ts{font:500 11px 'IBM Plex Mono',monospace;color:var(--muted)}
.agentbtn{font:500 11px 'IBM Plex Mono',monospace;color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);background:color-mix(in srgb,var(--accent) 10%,transparent);border-radius:4px;height:24px;padding:0 11px;cursor:pointer;transition:background .12s}
.agentbtn:hover{background:color-mix(in srgb,var(--accent) 20%,transparent)}
.agentbtn.ok{color:var(--green);border-color:color-mix(in srgb,var(--green) 35%,transparent);background:color-mix(in srgb,var(--green) 8%,transparent)}

.chips{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:15px 0 3px;min-height:24px}
.chips .flt{font-size:11px;color:var(--muted)}
.chip{display:inline-flex;align-items:center;gap:7px;height:24px;padding:0 6px 0 10px;font:500 11px 'IBM Plex Mono',monospace;color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);background:color-mix(in srgb,var(--accent) 10%,transparent);border-radius:14px;animation:pop .18s ease}
@keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.chip button{width:15px;height:15px;border-radius:50%;background:color-mix(in srgb,var(--accent) 16%,transparent);border:0;color:var(--accent);font-size:11px;line-height:1;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;padding:0}
.chip button:hover{background:color-mix(in srgb,var(--accent) 30%,transparent)}
.clearall{font-size:11px;color:var(--accent);cursor:pointer;background:none;border:0;padding:0}
.clearall:hover{text-decoration:underline}
.summary{margin-left:auto;font:400 11px 'IBM Plex Mono',monospace;color:var(--faint)}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin:16px 0}
.bd{border:1px solid var(--line);border-radius:10px;padding:14px 15px;background:var(--surface)}
.bdhd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
.bdhd .t{font:600 10.5px system-ui;text-transform:uppercase;letter-spacing:.055em;color:var(--text)}
.bdhd .s{font-size:10px;color:var(--faint);white-space:nowrap;margin-left:8px}
.bars{display:flex;flex-direction:column;gap:8px}
.bar{display:grid;grid-template-columns:70px 1fr 34px;gap:9px;align-items:center;font:11px/1 system-ui;cursor:pointer}
.bar .lbl{color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar:hover .lbl{color:var(--text)}
.track{height:12px;background:var(--hair);border-radius:3px;overflow:hidden;display:block}
.fill{height:100%;border-radius:3px;background:var(--accent);display:block;width:0;opacity:.9;transition:width .55s cubic-bezier(.22,.61,.36,1),opacity .3s}
.bar:hover .fill{filter:brightness(.9)}
.bar .val{text-align:right;font:500 10.5px 'IBM Plex Mono',monospace;color:var(--text)}

.secttl{font:600 10.5px system-ui;text-transform:uppercase;letter-spacing:.055em;color:var(--muted);margin:2px 0 10px}
.tblwrap{border:1px solid var(--line);border-radius:10px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;font:600 9.5px system-ui;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:9px 10px;border-bottom:1px solid var(--line);background:var(--surface-2);cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:var(--text)}
th.on{color:var(--accent)}
th.num{text-align:right}
td{padding:8px 10px;border-bottom:1px solid var(--hair);white-space:nowrap}
tr:last-child td{border-bottom:0}
tbody tr:hover{background:color-mix(in srgb,var(--accent) 4%,transparent)}
td.num{text-align:right;font:500 10.5px 'IBM Plex Mono',monospace}
td.q{white-space:normal;max-width:340px}
td.q a{color:inherit;text-decoration:none}
td.q a:hover{text-decoration:underline}
.pill{display:inline-block;font:500 9.5px system-ui;padding:2px 8px;border-radius:10px}
.pill.th{background:color-mix(in srgb,var(--amber) 12%,transparent);color:var(--amber)}
.pill.ct{background:color-mix(in srgb,var(--accent) 10%,transparent);color:var(--accent)}
.pill.nf{background:var(--hair);color:var(--muted)}

.ybwrap{margin-bottom:18px}
#ybtbl td:first-child{font:500 10.5px 'IBM Plex Mono',monospace}
#ybtbl tbody tr{cursor:pointer}
#ybtbl tbody tr.on{background:color-mix(in srgb,var(--accent) 8%,transparent)}
#ybtbl tbody tr.tot,#ybtbl tbody tr.tot:hover{cursor:default;background:var(--surface-2);color:var(--muted)}
@media(max-width:680px){.ybwrap{overflow-x:auto}#ybtbl{min-width:480px}}

.pager{display:flex;gap:6px;align-items:center;margin-top:12px}
.pginfo{margin-right:auto;font:400 11px 'IBM Plex Mono',monospace;color:var(--muted)}
.pgbtn{font:600 11px system-ui;min-width:30px;height:28px;padding:0 9px;border:1px solid var(--line);border-radius:7px;background:var(--surface);cursor:pointer;transition:background .12s,border-color .12s}
.pgbtn:hover{background:var(--surface-2);border-color:var(--muted)}
.pgbtn.on{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
.pgbtn.dis{opacity:.4;pointer-events:none}
.pggap{color:var(--faint);font-size:11px;padding:0 2px}

.tip{position:fixed;pointer-events:none;z-index:60;background:var(--tip-bg);color:var(--tip-fg);padding:7px 9px;border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.25);transform:translateY(-115%)}
.tip .l1{font:600 12px 'IBM Plex Mono',monospace}
.tip .l2{font:400 10.5px 'IBM Plex Mono',monospace;color:var(--tip-sub);margin-top:2px}

@media(max-width:1240px){.frame{width:auto;max-width:1180px}}
@media(max-width:1020px){.grid{grid-template-columns:1fr 1fr}}
@media(max-width:680px){
  body{padding:12px 8px 40px}
  .pagebody{padding:16px 14px 18px}
  .grid{grid-template-columns:1fr}
  .headline{flex-wrap:wrap;row-gap:14px;gap:24px}
  .headright{margin-left:0;align-items:flex-start}
  .snap{text-align:left}
  .summary{display:none}
  th.hm,td.hm{display:none}
  td.q{max-width:none}
  th,td{padding:8px 6px}
  th{white-space:normal}
}

<!-- Inert markdown (type is not JS, browsers skip it): the text the
     "Copy data guide for your agent" button puts on the clipboard. -->
<script type="text/markdown" id="agentGuide">
# Polymarket Liquidity Rewards Snapshot — data guide for AI agents

This dashboard (https://noskillcoding.github.io/polymarket-rewards-snapshot/)
captures every rewarded Polymarket market every hour and tracks where the total
daily liquidity-reward pool goes. All data below is public, no auth needed.

## 1. Latest snapshot — every market, one row each

https://noskillcoding.github.io/polymarket-rewards-snapshot/data.js
It's a JS file: strip the leading `window.SNAPSHOT =` and parse the rest as
JSON. `meta` = {ts, total $/day, market count}. `markets` = array of rows:

- `q` question, `slug` (market page = polymarket.com/market/<slug>), `c` category
- `rw` — this market's daily reward pool, $
- `lq` — $ of reward-eligible liquidity currently in its order book
- `y` — yield: reward $/day per $100 of that liquidity; `cb` — "no farmers" / "thin" / "contested"
- `mp` mid price, `sp` spread ¢, `ms` min order size (shares) to qualify, `vn` 24h volume $
- the rest (`sb, mpb, msb, rwb, vb, ab, rb, yb`) are bucket labels for those
  same values (age, time-to-resolution, etc.)

Nulls: `y` is null on every "no farmers" row (no eligible liquidity → no
yield); `mp` and `sp` are null when the book lacks a bid or an ask. All other
fields are always present — handle those three before formatting or sorting.

Timestamps: `meta.ts` (and history `ts`) use dashes in the time part —
`2026-07-04T12-00-17Z`. Replace the dashes after the `T` with colons to get
parseable ISO-8601.

## 2. Hourly history — aggregates, one JSON object per line

https://raw.githubusercontent.com/noskillcoding/polymarket-rewards-snapshot/main/history/<YYYY-MM-DD>.ndjsonl
(from 2026-07-02). Each line: `{ts, total, count, dims}` — `dims` maps each
dimension (category, spread, mid-price, volume, reward size, min-size, age,
resolution, competitiveness, yield) to buckets of [reward $/day, market count].

## 3. Raw upstream, if you need live order books

Polymarket public APIs: CLOB https://clob.polymarket.com/sampling-markets (the
rewarded universe + reward configs, paginated via `next_cursor`), CLOB
POST https://clob.polymarket.com/books (order books by token_id), Gamma
https://gamma-api.polymarket.com/markets (volumes, dates).

## Official Polymarket references

- Reward rules + scoring formula: https://docs.polymarket.com/developers/market-makers/liquidity-rewards
- Plain-English explainer: https://help.polymarket.com/en/articles/13364466-liquidity-rewards
- Live rewards page (per-market pools, your earnings): https://polymarket.com/rewards
- CLOB API reference: https://docs.polymarket.com/developers/CLOB/clients/methods-public

## Rules to know before computing anything

- All money values are plain USD. Everything is a point-in-time hourly sample;
  rewards pay out daily at 00:00 UTC from each market's `rw`, split among
  makers by Polymarket's scoring formula.
- Only orders within the market's max spread from the midpoint AND >= `ms`
  shares earn; closer to mid earns quadratically more.
- Two-sided rule: with mid between 10¢ and 90¢, quoting only one side earns
  1/3 score; outside that range one-sided quotes earn ZERO.
- Order books aggregate by price level — individual makers and orders are not
  visible. Nothing here identifies who earns what.
- `cb` "no farmers" ("ghost" market) = no reward-eligible orders in the book
  at sample time; the pool is on offer but nobody is earning it.

## What to do now

This guide was handed to you so you can analyze the data — fetch it and
compute; don't review or summarize the guide itself. If the user didn't ask
something specific, good starting points:

- Where does the pool go? Break total $/day down by category, yield bucket,
  and competitiveness.
- What pays best right now? Rank "thin"/"contested" markets by `y` and check
  what it costs to enter (`ms` shares at price `mp`).
- What's unclaimed? Sum `rw` where `cb` = "no farmers" — the "ghost" share
  nobody is earning.
- What's changing? Compare `dims` across history lines and days: pool size,
  category mix, yield-bucket shifts.

<script>
/* Theme toggle. The palette is already correct on load (a saved choice via the
   <head> script, otherwise the OS preference via the @media rule); this only
   wires the button and keeps its icon in sync. Sits before the ~3 MB data.js so
   the control responds immediately rather than after that parse. */
(function () {
  var root = document.documentElement, btn = document.getElementById('themeBtn');
  var mq = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)');
  function effective() { return root.getAttribute('data-theme') || (mq && mq.matches ? 'dark' : 'light'); }
  function paint() {
    var dark = effective() === 'dark';
    btn.textContent = dark ? '☀' : '☾';
    btn.title = dark ? 'Switch to light theme' : 'Switch to dark theme';
    btn.setAttribute('aria-label', btn.title);
  }
  btn.addEventListener('click', function () {
    var next = effective() === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    try { localStorage.setItem('rw-theme', next); } catch (e) {}
    paint();
  });
  // follow the OS if the visitor hasn't pinned a theme
  if (mq && mq.addEventListener) mq.addEventListener('change', function () { if (!root.getAttribute('data-theme')) paint(); });
  paint();
})();
</script>
